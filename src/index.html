<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano player</title>
    <link rel="stylesheet" href="./static/style/style.css">

</head>

<body>
    <div class="interactive-panel">
        <div class="switch-mode">
            <button class="btn_switch active">Interactive Mode</button>
            <button class="btn_switch">Prepared Mode</button>
        </div>
        <div class="recording-mode">
            <button class="btn_recording active">Record</button>
            <button class="btn_recording">Stop Recording</button>
            <button class="btn_recording">Download Recording</button>
        </div>
    </div>
    <div id="piano" class="piano">
        <div class="octave">
            <div class="piano__key white" data-note="C" data-key="q" data-freq="130.81">C</div>
            <div class="piano__key black cs" data-note="Cb" data-key="2"  data-freq="138.59">C#</div>
            <div class="piano__key white" data-note="D" data-key="w" data-freq="146.83">D</div>
            <div class="piano__key black ds"  data-note="Db" data-key="3" data-freq="155.56">D#</div>
            <div class="piano__key white"  data-note="E" data-key="e" data-freq="164.81">E</div>
            <div class="piano__key white" data-note="F" data-key="r" data-freq="174.61">F</div>
            <div class="piano__key black fs" data-note="Fb" data-key="5" data-freq="185.00">F#</div>
            <div class="piano__key white" data-note="G"data-key="t" data-freq="196.00">G</div>
            <div class="piano__key black gs"data-note="Gb" data-key="6" data-freq="207.65">G#</div>
            <div class="piano__key white" data-note="A"data-key="y" data-freq="220.00">A</div>
            <div class="piano__key black as"data-note="Ab" data-key="7" data-freq="233.08">A#</div>
            <div class="piano__key white" data-note="B"data-key="u" data-freq="246.94">B</div>
        </div>

    </div>
    <audio id="C" src="static/notes/C-note.mp3"></audio>
    <audio id="Cb" src="static/notes/Cb-note.mp3"></audio>
    <audio id="D" src="static/notes/D-note.mp3"></audio>
    <audio id="Db" src="static/notes/Db-note.mp3"></audio>
    <audio id="E" src="static/notes/E-note.mp3"></audio>
    <audio id="F" src="static/notes/F-note.mp3"></audio>
    <audio id="Fb" src="static/notes/Fb-note.mp3"></audio>

    <audio id="Gb" src="static/notes/Gb-note.mp3"></audio>
    <audio id="G" src="static/notes/G-note.mp3"></audio>
    <audio id="Ab" src="static/notes/Ab-note.mp3"></audio>
    <audio id="A" src="static/notes/A-note.mp3"></audio>
    <audio id="B" src="static/notes/B-note.mp3"></audio>
    <script src="static/script/main.js"></script>
</body>

</html>
